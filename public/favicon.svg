<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#f97316"/>

  <!-- Plate (white circle, slightly off-center bottom) -->
  <ellipse cx="32" cy="36" rx="16" ry="3.5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="32" cy="31" r="14" fill="white"/>
  <circle cx="32" cy="31" r="10" fill="#fff7ed"/>

  <!-- Fork (left of plate) -->
  <g fill="white">
    <!-- Fork handle -->
    <rect x="16" y="28" width="2.2" height="12" rx="1.1"/>
    <!-- Fork tines -->
    <rect x="15.2" y="17" width="0.9" height="7" rx="0.45"/>
    <rect x="17.2" y="17" width="0.9" height="7" rx="0.45"/>
    <rect x="19.2" y="17" width="0.9" height="7" rx="0.45"/>
    <!-- Fork neck -->
    <rect x="15.2" y="23.5" width="5" height="1.8" rx="0.7"/>
    <rect x="16.5" y="25" width="2.2" height="3.5" rx="1.1"/>
  </g>

  <!-- Knife (right of plate) -->
  <g fill="white">
    <!-- Knife handle -->
    <rect x="45.8" y="28" width="2.2" height="12" rx="1.1"/>
    <!-- Knife blade -->
    <path d="M45.8 17 Q49.5 20 47 27.5 L45.8 27.5 Z" fill="white"/>
  </g>

  <!-- Steam lines above plate -->
  <g stroke="#f97316" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M27 24 Q25.5 22 27 20 Q28.5 18 27 16"/>
    <path d="M32 23 Q30.5 21 32 19 Q33.5 17 32 15"/>
    <path d="M37 24 Q35.5 22 37 20 Q38.5 18 37 16"/>
  </g>
</svg>
