<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#00000026"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern dots -->
  <g fill="rgba(255,255,255,0.07)">
    <circle cx="60" cy="60" r="40"/>
    <circle cx="200" cy="560" r="60"/>
    <circle cx="1100" cy="80" r="70"/>
    <circle cx="1050" cy="550" r="45"/>
    <circle cx="600" cy="580" r="30"/>
  </g>

  <!-- Card -->
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="url(#cardBg)" filter="url(#shadow)"/>

  <!-- Icon area (left) -->
  <circle cx="300" cy="315" r="130" fill="#f97316" filter="url(#shadow)"/>
  <!-- Plate -->
  <circle cx="300" cy="315" r="88" fill="white"/>
  <circle cx="300" cy="315" r="72" fill="#fff7ed"/>
  <circle cx="300" cy="315" r="50" fill="white"/>

  <!-- Fork -->
  <g fill="#f97316">
    <rect x="218" y="293" width="12" height="60" rx="6"/>
    <rect x="214" y="228" width="5" height="38" rx="2.5"/>
    <rect x="223" y="228" width="5" height="38" rx="2.5"/>
    <rect x="232" y="228" width="5" height="38" rx="2.5"/>
    <rect x="214" y="262" width="24" height="10" rx="4"/>
    <rect x="219" y="270" width="12" height="25" rx="5"/>
  </g>

  <!-- Knife -->
  <g fill="#f97316">
    <rect x="370" y="293" width="12" height="60" rx="6"/>
    <path d="M370 228 Q386 248 380 291 L370 291 Z"/>
    <rect x="368" y="287" width="16" height="10" rx="4"/>
  </g>

  <!-- Steam -->
  <g stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.85">
    <path d="M278 238 Q268 222 278 206 Q288 190 278 174"/>
    <path d="M300 232 Q290 216 300 200 Q310 184 300 168"/>
    <path d="M322 238 Q312 222 322 206 Q332 190 322 174"/>
  </g>

  <!-- Text area (right) -->
  <!-- App name -->
  <text
    x="520"
    y="260"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="72"
    fill="#1c1917"
    letter-spacing="-2"
  >Piano Pasti</text>

  <text
    x="520"
    y="342"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="72"
    fill="#f97316"
    letter-spacing="-2"
  >Luca</text>

  <!-- Divider -->
  <rect x="520" y="375" width="80" height="5" rx="2.5" fill="#f97316"/>

  <!-- Subtitle -->
  <text
    x="520"
    y="430"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="34"
    fill="#78716c"
  >2400 kcal/giorno</text>

  <text
    x="520"
    y="476"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="34"
    fill="#78716c"
  >Piano alimentare settimanale</text>
</svg>
